name: Sync Quest Reviews

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  REVIEWS_DIR: reviews
  REVIEW_PAGE_SIZE: "20"
  MAX_REVIEWS: "100"
  REVIEW_SORT: helpful
  REQUEST_DELAY: "0.5"
  MAX_APPS: "50"
  MAX_WORKERS: "2"

jobs:
  sync-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --no-cache-dir requests

      - name: Sync reviews (batch sample)
        run: python sync_reviews.py

      - name: Commit reviews
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews/
          if git diff --staged --quiet; then
            echo "No review changes"
            exit 0
          fi
          git commit -m "Sync quest reviews $(date -u +%Y-%m-%d)"
          git push
